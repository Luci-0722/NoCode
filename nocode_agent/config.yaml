# GLM 默认配置
model: glm-5.1
base_url: "https://open.bigmodel.cn/api/coding/paas/v4"

## Ollama 本地配置
# model: qwen2.5-coder:14b
# base_url: "http://127.0.0.1:11434/v1"

# HTTP/HTTPS 代理，留空或不设置则不使用代理
# 支持 http:// 和 socks5:// 协议
# proxy: "http://127.0.0.1:7890"
# proxy: "socks5://127.0.0.1:1080"

max_tokens: 4096
temperature: 0.7
subagent_model: glm-5.1
# subagent_model: qwen2.5-coder:14b
subagent_temperature: 0.7

checkpoint_db_path: "nocode_agent/.state/langgraph-checkpoints.sqlite"
acp_sessions_path: "nocode_agent/.state/acp-sessions.json"

compression:
  # ── Layer 1: 微压缩 ─────────────────────────────
  # token 占用达到窗口的 60% 时触发裁剪
  trigger_token_percent: 0.60
  # 可压缩工具结果条数达到窗口对应比例时触发
  trigger_tool_percent: 0.60
  # 裁剪时始终保留最近 5 条可压缩工具结果
  keep_recent_tools: 5
  compressible_tools:
    - read
    - bash
    - glob
    - list_dir
    - grep
    - write
    - edit
    - web_search
    - web_fetch
    - ask_user_question
    - delegate_code

skills:
  enabled: true
  # Shell command timeout for skill pre-execution (seconds)
  shell_timeout: 10
  # Listing injection budget
  listing_budget_percent: 0.01
  listing_max_desc_chars: 250
  # Compression restore budget
  restore_max_per_skill: 5000
  restore_total_budget: 25000

auto_compact:
  # ── Layer 3: LLM 总结压缩 ──────────────────────
  # ── Layer 3: LLM 总结压缩 ──────────────────────
  enabled: true
  # token 占用达到窗口的 80% 时触发总结（高于微压缩的 60%）
  trigger_percent: 0.80
  # 为总结输出预留的空间
  reserved_output_tokens: 4096
  # 有效窗口 - buffer = 实际触发阈值
  buffer_tokens: 13000
  # 总结生成的最大输出 tokens
  max_summary_tokens: 16000
  # 连续失败 3 次后熔断
  max_consecutive_failures: 3
  # 压缩后恢复最近读取的 5 个文件
  max_files_to_restore: 5
  # 每个恢复文件最多保留的字符数
  max_tokens_per_file: 20000
  # 所有恢复文件的总字符预算
  total_file_budget: 200000

session_memory:
  # ── Layer 2: 会话记忆 ──────────────────────────
  enabled: true
  # 上下文达到此 token 数才开始提取
  min_tokens_to_init: 10000
  # 两次提取间至少增长的 token 数
  min_tokens_between_updates: 5000
  # 两次提取间至少发生的工具调用次数
  min_tool_calls_between_updates: 3
  # summary.md 总计最多 token 数
  max_total_tokens: 12000
  # 记忆文件存储根目录
  storage_path: "nocode_agent/.state/session-memory"
