model: glm-4.6
base_url: "https://open.bigmodel.cn/api/paas/v4"
max_tokens: 4096
temperature: 0.7
subagent_model: glm-4.6
subagent_temperature: 0.1

checkpoint_db_path: "nocode_agent/.state/langgraph-checkpoints.sqlite"
acp_sessions_path: "nocode_agent/.state/acp-sessions.json"

compression:
  trigger_tokens: 8000
  keep_recent: 10
  compressible_tools:
    - read
    - bash
    - glob
    - list_dir
    - grep
    - write
    - edit
    - web_search
    - web_fetch
    - delegate_code
