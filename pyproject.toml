[project]
name = "best-friend"
version = "0.1.0"
description = "Your personal AI agent companion"
requires-python = ">=3.12"
dependencies = [
    "openai>=1.58.0",
    "rich>=13.9.0",
    "apscheduler>=3.10.4",
    "pyyaml>=6.0.2",
    "playwright>=1.58.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24"]

[project.scripts]
bf = "src.cli:main"

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"
